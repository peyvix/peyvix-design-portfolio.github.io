<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ПРОЕКТ • ELENA VOSS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/case.css">
</head>
<body>

<!-- Custom Cursor -->
<div id="custom-cursor" class="cursor-dot"></div>

<!-- HEADER -->
<header class="header">
    <section class="header__container limiter">
        <a href="../index.html" class="logo">
            <div class="logo-circle">P</div>
            <span class="logo-name">EYVIX Design</span>
        </a>
        
        <nav class="nav-menu">
            <a href="../index.html#work" class="nav-link">Главная</a>
            <a href="../index.html#contact" class="nav-link">Контакт</a>
        </nav>

        <a href="../index.html#work" class="back-btn">
            <i class="fa-solid fa-arrow-left"></i>
            <span>Назад</span>
        </a>
    </section>
</header>

<main class="case-main limiter">
    <section class="case-img__container">
        <div class="case-img-wrapper" id="case-gallery">
            <img src="" alt="Case Preview" class="full-res-img" id="case-main-img">
        </div>
    </section>

    <section class="case-info__container">
        <header class="details-header">
            <h1 class="heading" id="case-title">Boost It</h1>
            <div class="contact-wrapper">
                <a href="../index.html#contact" class="btn-contact">Связаться</a>
            </div>
        </header>

        <div class="meta-grid" id="case-content">
            <div class="meta-item">
                <span class="label">Aspect Ratio</span>
                <span class="value" id="case-ratio">1:1 / Cover</span>
            </div>
            <div class="meta-item">
                <span class="label">Software</span>
                <span class="value" id="case-software">Photoshop</span>
            </div>
            <div class="meta-item">
                <span class="label">Client / Year</span>
                <span class="value" id="case-client-year">Kai Angel / 2026</span>
            </div>
            <div class="meta-item">
                <span class="label">Category</span>
                <span class="value" id="case-category">Branding, Visual Design</span>
            </div>
        </div>

        <div class="project-description">
            <p class="description" id="case-description">
                Обложка для трека Boost It артиста Kai Angel...
            </p>
        </div>
    </section>
</main>

<footer class="footer">
    © 2026 Elena Voss. Все права защищены.
</footer>

<script src="../js/script.js"></script>
<script src="../js/cases-data.js"></script>
<script src="../js/case.js"></script>

</body>
</html>
